# This GitHub Action requires Github Secret with Google Authentication
# The real data trigger will be activated after UI prototyping and discussion with the board regarding credential rules 

name: Update proposal data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-proposals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth pyyaml

      - name: Fetch sheet and write _data/proposals.yml
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          SHEET_RANGE: ${{ secrets.GOOGLE_SHEETS_RANGE }}
        run: |
          python - <<'PY'
          import json
          import os
          import yaml
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          
          svc_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON")
          if not svc_json:
              raise SystemExit("Missing GOOGLE_SERVICE_ACCOUNT_JSON secret")
          
          sheet_id = os.environ.get("SHEET_ID")
          if not sheet_id:
              raise SystemExit("Missing SHEET_ID secret")
          
          range_name = os.environ.get("SHEET_RANGE") or "Form Responses 1!A:Z"
          
          info = json.loads(svc_json)
          scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"]
          creds = service_account.Credentials.from_service_account_info(info, scopes=scopes)
          service = build("sheets", "v4", credentials=creds)
          
          result = (
              service.spreadsheets()
              .values()
              .get(spreadsheetId=sheet_id, range=range_name)
              .execute()
          )
          
          values = result.get("values", [])
          data = []
          
          if values:
              headers = [(h or "").strip() for h in values[0]]
              for row in values[1:]:
                  if not any(str(cell).strip() for cell in row):
                      continue
                  row = list(row) + [""] * (len(headers) - len(row))
                  item = {}
                  for i, header in enumerate(headers):
                      key = header or f"column_{i + 1}"
                      item[key] = row[i] if i < len(row) else ""
                  data.append(item)
          
          os.makedirs("_data", exist_ok=True)
          with open("_data/proposals.yml", "w", encoding="utf-8") as f:
              yaml.safe_dump(data, f, sort_keys=False, allow_unicode=True)
          PY

      - name: Commit and push if changed
        run: |
          if git status --porcelain | grep -q "_data/proposals.yml"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/proposals.yml
            git commit -m "Update proposals data"
            git push
          else
            echo "No changes to commit."
          fi
